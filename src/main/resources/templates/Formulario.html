<!DOCTYPE html>
<html xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro de Pedido - Muebles</title>
    <link rel="stylesheet" href="https://jsdelivr.net">
</head>
<body class="container mt-5">
    <h2>Registrar Nuevo Pedido</h2>
    <div class="card p-4">
        <!-- El formulario usa el método POST -->
        <form th:action="@{/api/pedidos}" method="post">
            <div class="mb-3">
                <label class="form-label">Fecha del Pedido:</label>
                <input type="date" name="fecha" class="form-control" required>
            </div>

            <h4>Detalles del Producto</h4>
            <div class="mb-3">
                <label class="form-label">ID del Producto (Ej: 2):</label>
                <input type="number" name="productoId" class="form-control" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Cantidad:</label>
                <input type="number" name="cantidad" class="form-control" value="1" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Precio Unitario:</label>
                <input type="number" step="0.01" name="precio" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-primary">Guardar Pedido</button>
        </form>
    </div>
</body>
</html>
